<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>페이지를 찾을 수 없습니다 — Tellama</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/tellama/favicon-32x32.png">
  <style>
    *{box-sizing:border-box}body{display:grid;min-width:320px;min-height:100vh;min-height:100svh;place-items:center;margin:0;padding:24px;background:#f5f7ef;color:#171a16;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif}.card{width:min(560px,100%);padding:clamp(30px,7vw,56px);border:1px solid #dfe5d8;border-radius:30px;background:#fff;box-shadow:0 24px 70px rgba(30,47,36,.1);text-align:center}.card img{width:82px;height:82px;margin:0 auto 23px;border:1px solid #dceab9;border-radius:24px}.code{margin:0;color:#67892d;font-size:12px;font-weight:900;letter-spacing:.14em}.card h1{margin:10px 0 12px;font-size:clamp(30px,8vw,46px);letter-spacing:-.05em}.card p{margin:0;color:#687064;line-height:1.7}.actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:28px}.actions a{display:inline-flex;min-height:48px;align-items:center;justify-content:center;padding:0 19px;border:1px solid #8dc829;border-radius:14px;background:#b8f34a;color:#11150f;font-weight:900;text-decoration:none}.actions a+ a{border-color:#dfe5d8;background:#fff}@media(max-width:420px){.actions{display:grid}.actions a{width:100%}}
  </style>
</head>
<body>
  <main class="card">
    <img src="/tellama/assets/tellama-icon.png" width="82" height="82" alt="">
    <p class="code">ERROR 404</p>
    <h1>페이지를 찾을 수 없습니다.</h1>
    <p>주소가 바뀌었거나 삭제된 페이지입니다. Tellama 홈페이지 또는 최신 릴리즈로 이동해 주세요.</p>
    <div class="actions"><a href="/tellama/">홈페이지로 이동</a><a href="https://github.com/redpluglab/tellama/releases/latest">최신 APK 보기</a></div>
  </main>
</body>
</html>
